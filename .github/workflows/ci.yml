name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bidals
          POSTGRES_USER: bidals
          POSTGRES_PASSWORD: bidals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bidals -d bidals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: bidals.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key
      DATABASE_URL: postgres://bidals:bidals@localhost:5432/bidals
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django checks
        run: python manage.py check

      - name: Run operational readiness commands
        run: |
          python manage.py migrate --noinput
          python manage.py release_check
          python manage.py backup_verify

      - name: Run tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t bidals-backend:ci ./backend

      - name: Build frontend image
        run: >
          docker build
          --file ./frontend/Dockerfile.prod
          --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
          -t bidals-frontend:ci
          ./frontend

      - name: Build frontend E2E image
        run: docker build --file ./frontend/Dockerfile.e2e -t bidals-frontend-e2e:ci ./frontend

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan for obvious committed secrets
        run: python scripts/security_secrets_check.py

      - name: Python dependency audit
        continue-on-error: true
        working-directory: backend
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements-prod.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend npm audit
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bidals
          POSTGRES_USER: bidals
          POSTGRES_PASSWORD: bidals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bidals -d bidals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: bidals.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://bidals:bidals@localhost:5432/bidals
      REDIS_URL: redis://localhost:6379/0
      USE_REDIS_CACHE: "True"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api
      E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Migrate and seed demo data
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed_demo

      - name: Start backend
        working-directory: backend
        run: |
          python manage.py runserver 127.0.0.1:8000 &
          for i in {1..40}; do
            curl -fsS http://127.0.0.1:8000/api/health/ && exit 0
            sleep 2
          done
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
